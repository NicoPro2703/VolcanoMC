<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VolcanoMC - Beta 11 Final</title>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, set, get, push, onValue, remove, query, orderByChild, limitToFirst } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDx1e4vz7W2C7SuAhygkmYzJJOKzGdDSuE",
    authDomain: "realtime-database-d61c8.firebaseapp.com",
    databaseURL: "https://realtime-database-d61c8-default-rtdb.firebaseio.com",
    projectId: "realtime-database-d61c8",
    storageBucket: "realtime-database-d61c8.firebasestorage.app",
    messagingSenderId: "42399354921",
    appId: "1:42399354921:web:ad3505f325a98293718438"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  window.accessAccount = async (user, pass, isRegister) => {
    if(!user || !pass) return alert("Rellena los datos");
    const lowerUser = user.toLowerCase();
    if (isRegister && (lowerUser === "volcano" || lowerUser === "volcanomc")) {
        showMemeVideo(Math.random() > 0.5 ? "rick.mp4" : "skibiri.mp4");
        return; 
    }
    const userRef = ref(db, 'usuarios/' + user);
    const snapshot = await get(userRef);
    if (isRegister) {
      if (snapshot.exists()) alert("Ese nombre ya existe");
      else {
        await set(userRef, { password: pass });
        alert("¡Cuenta creada!");
        toggleForms();
      }
    } else {
      if (snapshot.exists() && snapshot.val().password === pass) {
        window.currentUser = user;
        if(user === "VolcanoMC111" && pass === "1234") window.isAdmin = true;
        startMusic(); // La música empieza al entrar
        showScreen("main-menu");
      } else alert("Datos incorrectos");
    }
  };

  window.togglePass = (inputId, btnId) => {
    const input = document.getElementById(inputId);
    const btn = document.getElementById(btnId);
    if (input.type === "password") { input.type = "text"; btn.innerText = "🙈"; } 
    else { input.type = "password"; btn.innerText = "👁️"; }
  };

  window.loadRankings = (callback) => {
    const q = query(ref(db, 'rankings'), orderByChild('time'), limitToFirst(5));
    onValue(q, (snap) => {
      const data = [];
      snap.forEach(c => { data.push({ id: c.key, ...c.val() }); });
      data.sort((a,b) => a.time - b.time);
      callback(data);
    });
  };
</script>

<style>
  :root { --accent: #e67e22; --bg: #2c3e50; }
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; }
  
  .version-tag { position: fixed; bottom: 10px; right: 15px; font-size: 12px; opacity: 0.6; }
  .box { background: white; padding: 25px; border-radius: 15px; width: 320px; text-align: center; color: #333; z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
  .hidden { display: none !important; }
  
  .input-group { position: relative; width: 100%; margin: 10px 0; }
  input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
  .eye-btn { position: absolute; right: 12px; top: 0; background: none; border: none; font-size: 20px; cursor: pointer; height: 100%; display: flex; align-items: center; color: #777; }
  
  button.main-btn { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 15px; }
  .sec-btn { background: #34495e !important; }
  
  #target { width: 60px; height: 60px; background: var(--accent); border-radius: 50%; position: absolute; cursor: pointer; }
  
  /* Estilos Configuración */
  .config-row { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; font-weight: bold; }
  input[type="range"] { cursor: pointer; accent-color: var(--accent); width: 60%; }
</style>
</head>
<body>

<audio id="bg-music" loop src="musica.mp3"></audio>
<div class="version-tag">Version Beta 11</div>

<div id="meme-container" class="hidden" style="position:fixed; top:0; left:0; width:100vw; height:100vh; background:black; z-index:1000; display:flex; flex-direction:column; justify-content:center; align-items:center;">
    <video id="meme-video" style="width:80%; max-width:500px; border:3px solid var(--accent);" controls></video>
    <button class="main-btn" onclick="location.reload()" style="width:200px">SOY UN IMPOSTOR</button>
</div>

<div id="auth-screen" class="box">
    <h1 style="color:var(--accent); margin:0 0 15px 0;">🌋 VolcanoMC</h1>
    <div id="login-form">
        <input id="u-name" type="text" placeholder="Usuario">
        <div class="input-group">
            <input id="u-pass" type="password" placeholder="Contraseña">
            <button id="eye-login" class="eye-btn" onclick="togglePass('u-pass', 'eye-login')">👁️</button>
        </div>
        <button class="main-btn" onclick="accessAccount(document.getElementById('u-name').value, document.getElementById('u-pass').value, false)">ENTRAR</button>
        <p onclick="toggleForms()" style="cursor:pointer; font-size:12px; margin-top:10px;">¿No tienes cuenta? Regístrate</p>
    </div>
    <div id="register-form" class="hidden">
        <input id="reg-name" type="text" placeholder="Usuario (Sin puntos)">
        <div class="input-group">
            <input id="reg-pass" type="password" placeholder="Contraseña">
            <button id="eye-reg" class="eye-btn" onclick="togglePass('reg-pass', 'eye-reg')">👁️</button>
        </div>
        <button class="main-btn" style="background:#27ae60" onclick="accessAccount(document.getElementById('reg-name').value, document.getElementById('reg-pass').value, true)">REGISTRARME</button>
        <p onclick="toggleForms()" style="cursor:pointer; font-size:12px; margin-top:10px;">Ya tengo cuenta</p>
    </div>
</div>

<div id="main-menu" class="box hidden">
    <h2 id="user-display" style="margin-top:0; color:var(--accent)"></h2>
    <button class="main-btn" onclick="startGame()">JUGAR</button>
    <button class="main-btn sec-btn" onclick="showScreen('config-screen')">CONFIGURACIÓN</button>
    <button class="main-btn sec-btn" onclick="showRank()">RANKING</button>
    <button class="main-btn" style="background:#c0392b" onclick="location.reload()">SALIR</button>
</div>

<div id="config-screen" class="box hidden">
    <h2 style="color:var(--accent); margin-top:0;">AJUSTES</h2>
    <div class="config-row">
        <span>Música</span>
        <input type="range" id="vol-slider" min="0" max="1" step="0.1" value="0.5" oninput="updateVol()">
    </div>
    <button class="main-btn" onclick="showScreen('main-menu')">GUARDAR</button>
</div>

<div id="game-area" class="hidden" style="width:100vw; height:100vh; position:relative" onmousedown="failGame()">
    <div id="target" onmousedown="hit(event)"></div>
</div>

<div id="rank-screen" class="box hidden">
    <h2 style="color:var(--accent); margin-top:0;">TOP 5</h2>
    <div id="list" style="margin-bottom:15px"></div>
    <button class="main-btn" onclick="showScreen('main-menu')">VOLVER</button>
</div>

<script>
let clicks = 10, playing = false;
const music = document.getElementById("bg-music");

function startMusic() { music.volume = 0.5; music.play().catch(() => console.log("Clicka algo para sonar")); }
function updateVol() { music.volume = document.getElementById("vol-slider").value; }

function showMemeVideo(src) { 
    const v = document.getElementById("meme-video"); v.src = src; 
    document.getElementById("meme-container").classList.remove("hidden"); v.play(); 
}

function showScreen(id) {
    document.querySelectorAll('.box, #game-area').forEach(s => s.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    if(id === 'main-menu') document.getElementById('user-display').innerText = window.currentUser;
}

function toggleForms() { 
    document.getElementById("login-form").classList.toggle("hidden"); 
    document.getElementById("register-form").classList.toggle("hidden"); 
}

function startGame() { showScreen('game-area'); clicks = 10; playing = true; move(); }

function move() {
    const t = document.getElementById("target");
    t.style.left = Math.random() * (window.innerWidth - 70) + "px";
    t.style.top = Math.random() * (window.innerHeight - 70) + "px";
}

function hit(e) { 
    e.stopPropagation(); clicks--; 
    if (clicks <= 0) { playing = false; showRank(); } else move(); 
}

function failGame() { if(playing) { playing = false; alert("¡MANCO!"); showScreen('main-menu'); } }

function showRank() {
    showScreen('rank-screen');
    window.loadRankings(scores => {
        document.getElementById("list").innerHTML = scores.map((s, i) => `
            <div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #eee">
                <span><b>${i+1}.</b> ${s.user} - ${s.time}s</span>
                ${window.isAdmin ? `<b style="color:red; cursor:pointer" onclick="deleteScore('${s.id}')">X</b>` : ''}
            </div>
        `).join("");
    });
}
</script>
</body>
</html>
