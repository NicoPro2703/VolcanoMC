<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VolcanoMC Minijuego - Beta-3</title>

<style>
:root { --accent: #e67e22; }
body{ margin:0; font-family:'Segoe UI', Arial; background:#f4f4f4; overflow: hidden; }

.screen{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    background:white; padding:25px; border-radius:15px; text-align:center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 300px; z-index: 100;
}

.hidden{ display:none !important; }

#version-tag {
    position: fixed; bottom: 10px; right: 10px;
    font-size: 12px; color: #888; font-weight: bold; z-index: 1000;
    pointer-events: none;
}

.game-ui {
    position: fixed; top: 15px; background: white; padding: 10px 15px; 
    border-radius: 8px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    z-index: 50; pointer-events: none;
}

#ui-left { left: 15px; }
#ui-right { right: 15px; border-left: 4px solid var(--accent); }

#game-area{ 
    width:100vw; height:100vh; position:relative; 
    cursor: crosshair; background: rgba(0,0,0,0.01); 
}

#target{
    width:60px; height:60px; background: var(--accent); border-radius:50%;
    position:absolute; display:flex; justify-content:center; align-items:center;
    color:white; cursor:pointer; font-weight:bold; user-select: none; z-index: 10;
}

/* TROLL VIDEO (LA CÁRCEL UNIFICADA) */
#troll{
    position:fixed; top:0; left:0; width:100vw; height:100vh;
    background:black; display:flex; justify-content:center; align-items:center;
    flex-direction:column; z-index:9999;
}
video{ width:100%; height: 80%; pointer-events: none; }
video::-webkit-media-controls { display: none !important; }

.leaderboard-item{ 
    display:flex; justify-content:space-between; align-items:center;
    margin:10px 0; border-bottom: 1px solid #eee; padding-bottom: 5px; 
}
.btn-del { background: #ff4757; color: white; border: none; border-radius: 4px; cursor: pointer; padding: 2px 8px; font-size: 12px; }
</style>
</head>

<body oncontextmenu="return false;">

<div id="version-tag">Beta-3</div>

<div id="screen-login" class="screen">
    <h1 style="color: var(--accent);">🌋 VolcanoMC</h1>
    <input id="username" placeholder="Tu nombre" style="padding:8px; width:80%;">
    <br><br>
    <button onclick="login()" style="padding:10px 25px; background:var(--accent); color:white; border:none; border-radius:5px; cursor:pointer;">Entrar</button>
</div>

<div id="screen-gameover" class="screen hidden">
    <h1 style="color: #c0392b;">💥 GAME OVER</h1>
    <p>¡Has fallado el tiro!</p>
    <p>Tiempo final: <span id="fail-time">0.00</span>s</p>
    <br>
    <button onclick="restartGame()" style="padding:10px 25px; background:#34495e; color:white; border:none; border-radius:5px; cursor:pointer;">REINTENTAR</button>
</div>

<div id="game-area" class="hidden" onmousedown="gameOver()">
    <div id="ui-left" class="game-ui">Objetivos: <span id="clicks-left">10</span></div>
    <div id="ui-right" class="game-ui">Tiempo: <span id="live-timer">0.00</span>s</div>
    <div id="target" onmousedown="hitTarget(event)">10</div>
</div>

<div id="screen-leaderboard" class="screen hidden">
    <h2>🏆 TOP 5 TIEMPOS</h2>
    <div id="leaderboard-list"></div>
    <br>
    <button onclick="restartGame()" style="padding:8px 20px; cursor:pointer;">Cerrar Sesión</button>
</div>

<div id="troll" class="hidden">
    <video id="troll-video" playsinline disablePictureInPicture>
        <source id="video-source" src="" type="video/mp4">
    </video>
    <div id="troll-text" style="color:white; margin-top:15px; font-weight:bold;">ANUNCIO OBLIGATORIO</div>
    <button id="btn-skip" class="hidden" onclick="restartGame()" style="margin-top:20px; padding:10px 20px; background:#27ae60; color:white; border:none; border-radius:5px; cursor:pointer;">SALTAR ANUNCIO</button>
</div>

<script>
let currentUser = "";
let clicksNeeded = 10;
let startTime;
let timerInterval;
let isAdmin = false;
let isPlaying = false;

const vPlayer = document.getElementById("troll-video");
const skipBtn = document.getElementById("btn-skip");
const liveTimerDisplay = document.getElementById("live-timer");

window.addEventListener('keydown', (e) => { if ([' ', 'ArrowLeft', 'ArrowRight'].includes(e.key)) e.preventDefault(); });

vPlayer.onended = () => { 
    skipBtn.classList.remove("hidden"); 
    document.getElementById("troll-text").innerText = "¡Anuncio finalizado!";
};

function login(){
    const name = document.getElementById("username").value.trim();
    if (!name) return;
    
    currentUser = name;
    const lower = name.toLowerCase();

    // 1. ADMIN (Case Sensitive)
    if(name === "VolcanoMC.111"){ 
        isAdmin = true; 
        showLeaderboard(); 
        return; 
    }

    // 2. TROLLEO (Unificado para ambos nombres)
    if(lower === "volcanomc" || lower === "volcano"){
        isAdmin = false;
        const source = document.getElementById("video-source");
        source.src = (lower === "volcanomc") ? "rick.mp4" : "skibidi.mp4";
        
        document.getElementById("screen-login").classList.add("hidden");
        document.getElementById("troll").classList.remove("hidden");
        skipBtn.classList.add("hidden"); // Asegurar que esté oculto
        
        vPlayer.load(); 
        vPlayer.play();
        return;
    }

    // 3. JUEGO NORMAL
    isAdmin = false;
    startGame();
}

function startGame(){
    document.getElementById("screen-login").classList.add("hidden");
    document.getElementById("game-area").classList.remove("hidden");
    clicksNeeded = 10;
    isPlaying = true;
    startTime = Date.now();
    timerInterval = setInterval(() => {
        liveTimerDisplay.innerText = ((Date.now() - startTime) / 1000).toFixed(2);
    }, 10);
    moveTarget();
}

function moveTarget(){
    const t = document.getElementById("target");
    t.style.left = Math.random() * (window.innerWidth - 70) + "px";
    t.style.top = Math.random() * (window.innerHeight - 70) + "px";
    t.innerText = clicksNeeded;
    document.getElementById("clicks-left").innerText = clicksNeeded;
}

function hitTarget(event){
    event.stopPropagation();
    clicksNeeded--;
    if(clicksNeeded <= 0){
        stopGame();
        const finalTime = ((Date.now() - startTime) / 1000).toFixed(2);
        saveScore(currentUser, finalTime);
        showLeaderboard();
    } else { 
        moveTarget(); 
    }
}

function gameOver(){
    if(!isPlaying) return;
    const finalTime = ((Date.now() - startTime) / 1000).toFixed(2);
    stopGame();
    document.getElementById("game-area").classList.add("hidden");
    document.getElementById("screen-gameover").classList.remove("hidden");
    document.getElementById("fail-time").innerText = finalTime;
}

function stopGame() {
    isPlaying = false;
    clearInterval(timerInterval);
}

function saveScore(user, time){
    let scores = JSON.parse(localStorage.getItem("volcano_scores") || "[]");
    scores.push({user, time: parseFloat(time)});
    scores.sort((a,b) => a.time - b.time);
    localStorage.setItem("volcano_scores", JSON.stringify(scores.slice(0,5)));
}

function showLeaderboard(){
    document.getElementById("screen-login").classList.add("hidden");
    document.getElementById("game-area").classList.add("hidden");
    document.getElementById("screen-leaderboard").classList.remove("hidden");
    
    const scores = JSON.parse(localStorage.getItem("volcano_scores") || "[]");
    const list = document.getElementById("leaderboard-list");
    
    list.innerHTML = scores.map((s, i) => `
        <div class="leaderboard-item">
            <span><b>${i+1}.</b> ${s.user} - ${s.time}s</span>
            ${isAdmin ? `<button class="btn-del" onclick="deletePlayer(${i})">❌</button>` : ''}
        </div>
    `).join("");

    if(isAdmin && scores.length > 0){
        list.innerHTML += `<br><button onclick="resetAll()" style="background:#333; color:white; border:none; padding:5px; border-radius:4px; cursor:pointer; width:100%">Borrar Todo</button>`;
    }
}

function deletePlayer(index){
    let scores = JSON.parse(localStorage.getItem("volcano_scores") || "[]");
    scores.splice(index, 1);
    localStorage.setItem("volcano_scores", JSON.stringify(scores));
    showLeaderboard();
}

function resetAll(){
    if(confirm("¿Borrar todos los récords?")){
        localStorage.removeItem("volcano_scores");
        showLeaderboard();
    }
}

function restartGame(){
    stopGame();
    vPlayer.pause();
    document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
    document.getElementById("game-area").classList.add("hidden");
    document.getElementById("troll").classList.add("hidden");
    document.getElementById("screen-login").classList.remove("hidden");
    document.getElementById("username").value = "";
    liveTimerDisplay.innerText = "0.00";
}
</script>
</body>
</html>
