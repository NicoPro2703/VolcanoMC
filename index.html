<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VolcanoMC - Official Minigame</title>

<style>
:root {
    --bg-color: #f4f4f4;
    --text-color: #333;
    --container-bg: #fff;
    --accent: #e67e22;
}

[data-theme="dark"] {
    --bg-color: #1a1a1a;
    --text-color: #f4f4f4;
    --container-bg: #2d2d2d;
    --accent: #f39c12;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background-color: var(--bg-color);
    color: var(--text-color);
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Pantallas */
.screen {
    background-color: var(--container-bg);
    padding: 2.5rem;
    border-radius: 20px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    text-align: center;
    width: 90%;
    max-width: 400px;
    position: absolute;
}

.hidden { display: none !important; }

/* Troll */
.troll-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: black;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

video {
    width: 100%;
    height: 80%;
}

/* Juego */
#game-area {
    position: relative;
    width: 100vw;
    height: 100vh;
}

#target {
    width: 60px;
    height: 60px;
    background-color: var(--accent);
    border-radius: 50%;
    position: absolute;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: white;
    box-shadow: 0 0 20px var(--accent);
}

.leaderboard-item {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    border-bottom: 1px solid rgba(128,128,128,0.2);
}
</style>
</head>

<body>

<!-- ANUNCIO -->
<div id="troll-container" class="troll-overlay hidden">
    <video id="troll-video" muted playsinline>
        <source id="video-source" src="" type="video/mp4">
    </video>

    <div style="color:white;">ANUNCIO OBLIGATORIO</div>
    <button id="retry-btn" onclick="closeAd()" style="display:none;">SALTAR</button>
</div>

<!-- LOGIN -->
<div id="screen-login" class="screen">
    <h1 style="color: var(--accent);">🌋 VOLCANO MC</h1>
    <input type="text" id="username" placeholder="Tu nombre...">
    <br><br>
    <button onclick="login()">ENTRAR</button>
</div>

<!-- JUEGO -->
<div id="game-area" class="hidden">
    <div id="target" onclick="hitTarget()">10</div>
    <div style="position:fixed; top:20px; left:20px;">
        Objetivos: <span id="clicks-left">10</span>
    </div>
</div>

<!-- CLASIFICACIÓN -->
<div id="screen-leaderboard" class="screen hidden">
    <h2>🏆 TOP 5</h2>
    <div id="leaderboard-list"></div>
    <br>
    <button onclick="restart()">REINTENTAR</button>
</div>

<script>
let currentUser = "";
let clicksNeeded = 10;
let startTime;
let isAdmin = false;

const video = document.getElementById('troll-video');
const btn = document.getElementById('retry-btn');

/* LOGIN */
function login() {
    const name = document.getElementById('username').value.trim();
    if (!name) return;

    currentUser = name;

    if (name === "VolcanoMC.111") {
        isAdmin = true;
        alert("Modo ADMIN activado 😎");
    }

    // Troll users
    if (name.toLowerCase() === "volcano") {
        showAd("skibidi.mp4");
        return;
    }

    startGame();
}

/* ANUNCIO */
function showAd(file) {
    document.getElementById('video-source').src = file;
    document.getElementById('troll-container').classList.remove('hidden');
    video.load();
    video.play();

    setTimeout(() => {
        btn.style.display = "block";
    }, 3000);
}

function closeAd() {
    document.getElementById('troll-container').classList.add('hidden');
    startGame();
}

/* JUEGO */
function startGame() {
    document.getElementById('screen-login').classList.add('hidden');
    document.getElementById('game-area').classList.remove('hidden');

    clicksNeeded = 10;
    startTime = Date.now();

    moveTarget();
}

function moveTarget() {
    const t = document.getElementById('target');

    const maxX = window.innerWidth - 70;
    const maxY = window.innerHeight - 70;

    t.style.left = Math.random() * maxX + "px";
    t.style.top = Math.random() * maxY + "px";

    t.innerText = clicksNeeded;
    document.getElementById('clicks-left').innerText = clicksNeeded;
}

function hitTarget() {
    clicksNeeded--;

    if (clicksNeeded <= 0) {
        const time = ((Date.now() - startTime) / 1000).toFixed(2);
        saveScore(currentUser, time);
        showLeaderboard();
    } else {
        moveTarget();
    }
}

/* CLASIFICACIÓN */
function saveScore(user, time) {
    let scores = JSON.parse(localStorage.getItem('volcano_scores') || "[]");

    scores.push({ user, time: parseFloat(time) });
    scores.sort((a, b) => a.time - b.time);

    localStorage.setItem('volcano_scores', JSON.stringify(scores.slice(0, 5)));
}

function showLeaderboard() {
    document.getElementById('game-area').classList.add('hidden');
    document.getElementById('screen-leaderboard').classList.remove('hidden');

    const scores = JSON.parse(localStorage.getItem('volcano_scores') || "[]");
    const list = document.getElementById('leaderboard-list');

    list.innerHTML = scores.map((s, i) => `
        <div class="leaderboard-item">
            <span>${i+1}. ${s.user}</span>
            <span>${s.time}s</span>
        </div>
    `).join('');

    if (isAdmin) {
        list.innerHTML += `<button onclick="resetScores()">BORRAR TODO</button>`;
    }
}

function resetScores() {
    localStorage.removeItem('volcano_scores');
    showLeaderboard();
}

/* REINICIAR */
function restart() {
    location.reload();
}
</script>

</body>
</html>
