<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VolcanoMC - Sistema de Cuentas</title>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, set, get, push, onValue, remove, query, orderByChild, limitToFirst } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  // Configuración de tus capturas
  const firebaseConfig = {
    apiKey: "AIzaSyDx1e4vz7W2C7SuAhygkmYzJJOKzGdDSuE",
    authDomain: "realtime-database-d61c8.firebaseapp.com",
    databaseURL: "https://realtime-database-d61c8-default-rtdb.firebaseio.com",
    projectId: "realtime-database-d61c8",
    storageBucket: "realtime-database-d61c8.firebasestorage.app",
    messagingSenderId: "42399354921",
    appId: "1:42399354921:web:ad3505f325a98293718438"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // --- LÓGICA DE CUENTAS (REGISTRO Y LOGIN) ---
  window.accessAccount = async (user, pass, isRegister) => {
    if(!user || !pass) return alert("Rellena todos los campos");
    
    const userRef = ref(db, 'usuarios/' + user);
    const snapshot = await get(userRef);

    if (isRegister) {
      if (snapshot.exists()) {
        alert("Este nombre de usuario ya está pillado.");
      } else {
        // Esto crea la carpeta 'usuarios' automáticamente en Firebase
        await set(userRef, { password: pass });
        alert("¡Cuenta creada! Ahora dale a 'Ya tengo cuenta' para entrar.");
        toggleForms();
      }
    } else {
      if (snapshot.exists() && snapshot.val().password === pass) {
        window.currentUser = user;
        // Cambia el "1234" por la contraseña que quieras para tu admin
        if(user === "VolcanoMC.111" && pass === "1234") window.isAdmin = true;
        
        document.getElementById("auth-screen").classList.add("hidden");
        document.getElementById("game-area").classList.remove("hidden");
        startGame();
      } else {
        alert("Usuario o contraseña incorrectos.");
      }
    }
  };

  // --- LÓGICA DEL RANKING ---
  window.saveScore = (time) => {
    push(ref(db, 'rankings'), { 
        user: window.currentUser, 
        time: parseFloat(time),
        date: Date.now()
    });
  };

  window.loadRankings = (callback) => {
    const q = query(ref(db, 'rankings'), orderByChild('time'), limitToFirst(5));
    onValue(q, (snap) => {
      const data = [];
      snap.forEach(c => { data.push({ id: c.key, ...c.val() }); });
      data.sort((a,b) => a.time - b.time);
      callback(data);
    });
  };

  window.deleteScore = (id) => { 
    if(window.isAdmin && confirm("¿Borrar tiempo?")) remove(ref(db, 'rankings/' + id)); 
  };
</script>

<style>
  :root { --accent: #e67e22; }
  body { font-family: 'Segoe UI', sans-serif; background: #2c3e50; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; user-select: none; }
  .box { background: white; padding: 30px; border-radius: 15px; width: 300px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 100; }
  .hidden { display: none !important; }
  input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
  button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 16px; }
  button:active { transform: scale(0.98); }
  #target { width: 65px; height: 65px; background: var(--accent); border-radius: 50%; position: absolute; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; box-shadow: 0 0 20px var(--accent); font-size: 20px; }
  .ui-panel { position: fixed; top: 15px; background: white; padding: 8px 15px; border-radius: 25px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
  .rank-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; }
  .del-btn { background: #ff4757; padding: 4px 8px; font-size: 12px; width: auto; margin: 0; }
</style>
</head>
<body>

<div id="auth-screen" class="box">
    <h1 style="color: var(--accent); margin-bottom: 20px; margin-top: 0;">🌋 VolcanoMC</h1>
    
    <div id="login-form">
        <input id="u-name" type="text" placeholder="Usuario">
        <input id="u-pass" type="password" placeholder="Contraseña">
        <button onclick="accessAccount(document.getElementById('u-name').value, document.getElementById('u-pass').value, false)">ENTRAR</button>
        <p style="font-size: 13px; color: #666; cursor: pointer; margin-top: 15px;" onclick="toggleForms()">¿No tienes cuenta? <b>Regístrate aquí</b></p>
    </div>

    <div id="register-form" class="hidden">
        <input id="reg-name" type="text" placeholder="Nuevo Usuario">
        <input id="reg-pass" type="password" placeholder="Nueva Contraseña">
        <button onclick="accessAccount(document.getElementById('reg-name').value, document.getElementById('reg-pass').value, true)" style="background: #27ae60;">CREAR CUENTA</button>
        <p style="font-size: 13px; color: #666; cursor: pointer; margin-top: 15px;" onclick="toggleForms()">¿Ya tienes cuenta? <b>Inicia sesión</b></p>
    </div>
</div>

<div id="game-area" class="hidden" style="width: 100vw; height: 100vh;" onmousedown="failGame()">
    <div class="ui-panel" style="left: 20px;">Quedan: <span id="clicks-count">10</span></div>
    <div class="ui-panel" style="right: 20px;">Tiempo: <span id="timer-val">0.00</span>s</div>
    <div id="target" onmousedown="hitTarget(event)">10</div>
</div>

<div id="rank-screen" class="box hidden">
    <h2 style="color: var(--accent); margin-top: 0;">🏆 TOP 5 GLOBAL</h2>
    <div id="list-container">Cargando...</div>
    <button onclick="location.reload()">JUGAR OTRA VEZ</button>
    <p style="font-size: 11px; margin-top: 10px; color: #999;">Usuario: <span id="display-user"></span></p>
</div>

<script>
let clicks = 10, startTime, timerInterval, isPlaying = false;

function toggleForms() {
    document.getElementById("login-form").classList.toggle("hidden");
    document.getElementById("register-form").classList.toggle("hidden");
}

function startGame() {
    clicks = 10; isPlaying = true; startTime = Date.now();
    timerInterval = setInterval(() => {
        document.getElementById("timer-val").innerText = ((Date.now() - startTime)/1000).toFixed(2);
    }, 10);
    moveTarget();
}

function moveTarget() {
    const t = document.getElementById("target");
    t.style.left = Math.random() * (window.innerWidth - 80) + "px";
    t.style.top = Math.random() * (window.innerHeight - 80) + "px";
    t.innerText = clicks;
    document.getElementById("clicks-count").innerText = clicks;
}

function hitTarget(e) {
    e.stopPropagation();
    clicks--;
    if (clicks <= 0) {
        isPlaying = false;
        clearInterval(timerInterval);
        saveScore(document.getElementById("timer-val").innerText);
        showLeaderboard();
    } else {
        moveTarget();
    }
}

function failGame() {
    if(isPlaying) alert("¡Fallaste! Haz clic en el círculo.");
}

function showLeaderboard() {
    document.getElementById("game-area").classList.add("hidden");
    document.getElementById("rank-screen").classList.remove("hidden");
    document.getElementById("display-user").innerText = window.currentUser;

    window.loadRankings(scores => {
        const container = document.getElementById("list-container");
        if(scores.length === 0) return container.innerHTML = "Sin registros.";
        
        container.innerHTML = scores.map((s, i) => `
            <div class="rank-item">
                <span><b>${i+1}.</b> ${s.user} - ${s.time}s</span>
                ${window.isAdmin ? `<button class="del-btn" onclick="deleteScore('${s.id}')">X</button>` : ''}
            </div>
        `).join("");
    });
}
</script>
</body>
</html>
