<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VolcanoMC - Official Minigame</title>
    <style>
        :root {
            --bg-color: #f4f4f4;
            --text-color: #333;
            --container-bg: #fff;
            --accent: #e67e22;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --text-color: #f4f4f4;
            --container-bg: #2d2d2d;
            --accent: #f39c12;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            transition: 0.3s;
        }

        .screen {
            background-color: var(--container-bg);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            text-align: center;
            width: 90%;
            max-width: 400px;
            position: absolute;
            z-index: 10;
        }

        .hidden { display: none !important; }

        /* Estilos del Anuncio Bloqueado */
        .troll-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100%;
            height: 80%;
            outline: none;
        }

        /* OCULTAR CONTROLES EN CUALQUIER NAVEGADOR */
        video::-webkit-media-controls { display: none !important; }
        video::-webkit-media-controls-enclosure { display: none !important; }

        #troll-text {
            color: white;
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        #retry-btn {
            margin-top: 20px;
            padding: 15px 40px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            display: none; /* Totalmente oculto al inicio */
        }

        /* Área de Juego */
        #game-area {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: var(--bg-color);
        }

        #target {
            width: 60px; height: 60px;
            background-color: var(--accent);
            border-radius: 50%;
            position: absolute;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: white;
            box-shadow: 0 0 20px var(--accent);
            user-select: none;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div style="position: fixed; top: 20px; right: 20px; z-index: 100; cursor: pointer;" onclick="openSettings()">⚙️</div>

    <div id="troll-container" class="troll-overlay hidden">
        <video id="troll-video" playsinline disablePictureInPicture>
            <source id="video-source" src="" type="video/mp4">
        </video>
        <div id="troll-text">Reproduciendo anuncio obligatorio...</div>
        <button id="retry-btn" onclick="location.reload()">SALTAR ANUNCIO</button>
    </div>

    <div id="screen-login" class="screen">
        <h1 style="color: var(--accent);">🌋 VOLCANO MC</h1>
        <p>Introduce tu nick para empezar</p>
        <input type="text" id="username" placeholder="Tu nombre...">
        <br>
        <button onclick="login()">ENTRAR</button>
    </div>

    <div id="game-area" class="hidden">
        <div id="target" onclick="hitTarget()">10</div>
        <div style="position:fixed; top:20px; left:20px; font-weight: bold; background: var(--container-bg); padding: 10px; border-radius: 10px;">
            Objetivos: <span id="clicks-left">10</span>
        </div>
    </div>

    <div id="screen-leaderboard" class="screen hidden">
        <h2 style="color: var(--accent);">🏆 TOP 5 TIEMPOS</h2>
        <div id="leaderboard-list"></div>
        <br>
        <button onclick="location.reload()">VOLVER A JUGAR</button>
    </div>

    <script>
        const video = document.getElementById('troll-video');
        const btn = document.getElementById('retry-btn');
        const txt = document.getElementById('troll-text');

        // 1. BLOQUEO DE TECLAS (Espacio para pausar y Flechas para adelantar)
        window.addEventListener('keydown', function(e) {
            if ([' ', 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key)) {
                e.preventDefault();
            }
        }, false);

        // 2. DETECTAR FIN DEL VIDEO
        video.onended = function() {
            btn.style.display = "block"; // Solo aparece al final
            txt.innerText = "Anuncio finalizado.";
        };

        // 3. EVITAR QUE PINCHEN EN EL VIDEO PARA PAUSAR
        video.onclick = function(e) {
            e.preventDefault();
        };

        function login() {
            const name = document.getElementById('username').value.trim().toLowerCase();
            if (!name) return;

            if (name === "volcanomc" || name === "volcano") {
                const source = document.getElementById('video-source');
                
                if (name === "volcanomc") source.src = "rick.mp4";
                else source.src = "skibidi.mp4";

                document.getElementById('troll-container').classList.remove('hidden');
                video.load();
                video.play();
                return;
            }

            // Flujo normal
            if (name === "volcanomc.111") showLeaderboard();
            else startGame();
        }

        // --- FUNCIONES BÁSICAS ---
        let clicksNeeded = 10;
        let startTime;

        function startGame() {
            document.getElementById('screen-login').classList.add('hidden');
            document.getElementById('game-area').classList.remove('hidden');
            moveTarget();
            startTime = Date.now();
        }

        function moveTarget() {
            const t = document.getElementById('target');
            t.style.left = (Math.random() * (window.innerWidth - 80) + 10) + "px";
            t.style.top = (Math.random() * (window.innerHeight - 80) + 10) + "px";
            t.innerText = clicksNeeded;
        }

        function hitTarget() {
            clicksNeeded--;
            if (clicksNeeded <= 0) showLeaderboard();
            else moveTarget();
        }

        function showLeaderboard() {
            document.getElementById('game-area').classList.add('hidden');
            document.getElementById('screen-login').classList.add('hidden');
            document.getElementById('screen-leaderboard').classList.remove('hidden');
            // Aquí iría la lógica de guardado...
        }
    </script>
</body>
</html>
