<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VolcanoMC Minijuego - Beta-1</title>

<style>
:root { --accent: #e67e22; }
body{ margin:0; font-family:'Segoe UI', Arial; background:#f4f4f4; overflow: hidden; }

.screen{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    background:white; padding:25px; border-radius:15px; text-align:center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 300px; z-index: 100;
}

.hidden{ display:none !important; }

/* Etiqueta de versión en la esquina */
#version-tag {
    position: fixed; bottom: 10px; right: 10px;
    font-size: 12px; color: #888; font-weight: bold; z-index: 1000;
    pointer-events: none;
}

/* Área de Juego: debe tener un fondo para detectar clics */
#game-area{ 
    width:100vw; height:100vh; position:relative; 
    cursor: crosshair; background: rgba(0,0,0,0.01); 
}

#target{
    width:60px; height:60px; background: var(--accent); border-radius:50%;
    position:absolute; display:flex; justify-content:center; align-items:center;
    color:white; cursor:pointer; font-weight:bold; user-select: none; z-index: 10;
}

/* TROLL VIDEO (LA CÁRCEL) */
#troll{
    position:fixed; top:0; left:0; width:100vw; height:100vh;
    background:black; display:flex; justify-content:center; align-items:center;
    flex-direction:column; z-index:9999;
}
video{ width:100%; height: 80%; pointer-events: none; }
video::-webkit-media-controls { display: none !important; }
#troll-text { color: white; margin-top: 15px; font-weight: bold; text-transform: uppercase; }
#btn-skip { margin-top:20px; padding: 10px 25px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; }

.leaderboard-item{ display:flex; justify-content:space-between; margin:10px 0; border-bottom: 1px solid #eee; padding-bottom: 5px; }
</style>
</head>

<body oncontextmenu="return false;">

<div id="version-tag">Beta-1</div>

<div id="screen-login" class="screen">
    <h1 style="color: var(--accent);">🌋 VolcanoMC</h1>
    <input id="username" placeholder="Tu nombre" style="padding:8px; width:80%;">
    <br><br>
    <button onclick="login()" style="padding:10px 25px; background:var(--accent); color:white; border:none; border-radius:5px; cursor:pointer;">Entrar</button>
</div>

<div id="screen-gameover" class="screen hidden">
    <h1 style="color: #c0392b;">💥 GAME OVER</h1>
    <p>¡Has fallado el tiro!</p>
    <p>Tu tiempo: <span id="fail-time">0</span>s</p>
    <br>
    <button onclick="restartGame()" style="padding:10px 25px; background:#34495e; color:white; border:none; border-radius:5px; cursor:pointer;">INTENTAR DE NUEVO</button>
</div>

<div id="game-area" class="hidden" onmousedown="gameOver()">
    <div id="target" onmousedown="hitTarget(event)">10</div>
    <div style="position:fixed;top:15px;left:15px;background:white;padding:10px;border-radius:8px; font-weight:bold; pointer-events:none; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
        Objetivos: <span id="clicks-left">10</span>
    </div>
</div>

<div id="screen-leaderboard" class="screen hidden">
    <h2>🏆 TOP 5 TIEMPOS</h2>
    <div id="leaderboard-list"></div>
    <br>
    <button onclick="restartGame()" style="padding:8px 20px; cursor:pointer;">Volver</button>
</div>

<div id="troll" class="hidden">
    <video id="troll-video" playsinline disablePictureInPicture>
        <source id="video-source" src="" type="video/mp4">
    </video>
    <div id="troll-text">Reproduciendo anuncio obligatorio...</div>
    <button id="btn-skip" class="hidden" onclick="restartGame()">SALTAR ANUNCIO</button>
</div>

<script>
let currentUser=""
let clicksNeeded=10
let startTime
let isAdmin=false
let isPlaying=false

const vPlayer = document.getElementById("troll-video");
const skipBtn = document.getElementById("btn-skip");

window.addEventListener('keydown', (e) => { if ([' ', 'ArrowLeft', 'ArrowRight'].includes(e.key)) e.preventDefault(); });

vPlayer.onended = () => { 
    skipBtn.classList.remove("hidden"); 
    document.getElementById("troll-text").innerText = "¡Anuncio finalizado!";
};

function login(){
    const name=document.getElementById("username").value.trim()
    if(!name) return
    currentUser=name
    const lower = name.toLowerCase();

    if(name==="VolcanoMC.111"){ isAdmin=true; showLeaderboard(); return; }
    if(lower==="volcanomc"){ showTroll("rick.mp4"); return; }
    if(lower==="volcano"){ showTroll("skibidi.mp4"); return; }
    startGame()
}

function showTroll(file){
    document.getElementById("screen-login").classList.add("hidden")
    document.getElementById("video-source").src=file
    document.getElementById("troll").classList.remove("hidden")
    vPlayer.load(); 
    vPlayer.play();
}

function startGame(){
    document.getElementById("screen-login").classList.add("hidden")
    document.getElementById("game-area").classList.remove("hidden")
    clicksNeeded=10
    startTime=Date.now()
    isPlaying=true
    moveTarget()
}

function moveTarget(){
    const t=document.getElementById("target")
    const maxX = window.innerWidth - 70;
    const maxY = window.innerHeight - 70;
    t.style.left = Math.random() * maxX + "px";
    t.style.top = Math.random() * maxY + "px";
    t.innerText = clicksNeeded
    document.getElementById("clicks-left").innerText = clicksNeeded
}

function hitTarget(event){
    event.stopPropagation(); // Evita que el clic se cuente como fallo en el fondo
    clicksNeeded--
    if(clicksNeeded <= 0){
        isPlaying = false;
        const time = ((Date.now() - startTime) / 1000).toFixed(2);
        saveScore(currentUser, time);
        showLeaderboard();
    } else { 
        moveTarget(); 
    }
}

function gameOver(){
    if(!isPlaying) return;
    isPlaying = false;
    const time = ((Date.now() - startTime) / 1000).toFixed(2);
    document.getElementById("game-area").classList.add("hidden")
    document.getElementById("screen-gameover").classList.remove("hidden")
    document.getElementById("fail-time").innerText = time
}

function saveScore(user, time){
    let scores = JSON.parse(localStorage.getItem("volcano_scores") || "[]");
    scores.push({user, time: parseFloat(time)});
    scores.sort((a,b) => a.time - b.time);
    localStorage.setItem("volcano_scores", JSON.stringify(scores.slice(0,5)));
}

function showLeaderboard(){
    document.getElementById("game-area").classList.add("hidden")
    document.getElementById("screen-login").classList.add("hidden")
    document.getElementById("screen-leaderboard").classList.remove("hidden")
    const scores = JSON.parse(localStorage.getItem("volcano_scores") || "[]");
    const list = document.getElementById("leaderboard-list");
    list.innerHTML = scores.map((s, i) => `
        <div class="leaderboard-item">
            <span><b>${i+1}.</b> ${s.user}</span>
            <span>${s.time}s</span>
        </div>
    `).join("");
}

function restartGame(){
    isPlaying = false;
    vPlayer.pause();
    document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
    document.getElementById("game-area").classList.add("hidden")
    document.getElementById("troll").classList.add("hidden")
    document.getElementById("screen-login").classList.remove("hidden")
    document.getElementById("username").value = "";
}
</script>
</body>
</html>
