<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VolcanoMC - Beta Global</title>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, onValue, remove, query, orderByChild, limitToFirst } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  // Configuración exacta de tus capturas de pantalla
  const firebaseConfig = {
    apiKey: "AIzaSyDx1e4vz7W2C7SuAhygkmYzJJOKzGdDSuE",
    authDomain: "realtime-database-d61c8.firebaseapp.com",
    databaseURL: "https://realtime-database-d61c8-default-rtdb.firebaseio.com",
    projectId: "realtime-database-d61c8",
    storageBucket: "realtime-database-d61c8.firebasestorage.app",
    messagingSenderId: "42399354921",
    appId: "1:42399354921:web:ad3505f325a98293718438",
    measurementId: "G-MVXLJNHV56"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // Funciones Globales para que el HTML las vea
  window.saveScoreGlobal = (user, time) => {
    push(ref(db, 'rankings'), { 
        user: user, 
        time: parseFloat(time), 
        date: Date.now() 
    });
  };

  window.loadRankings = (callback) => {
    const topScores = query(ref(db, 'rankings'), orderByChild('time'), limitToFirst(5));
    onValue(topScores, (snapshot) => {
      const data = [];
      snapshot.forEach(child => { 
        data.push({ id: child.key, ...child.val() }); 
      });
      // Ordenamos manualmente por si Firebase tarda en indexar
      data.sort((a, b) => a.time - b.time);
      callback(data);
    });
  };

  window.deleteScoreGlobal = (id) => {
    if(confirm("¿Borrar este tiempo?")) {
        remove(ref(db, 'rankings/' + id));
    }
  };
</script>

<style>
:root { --accent: #e67e22; }
body{ margin:0; font-family:'Segoe UI', sans-serif; background:#f4f4f4; overflow: hidden; user-select: none; }
.screen{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:25px; border-radius:15px; text-align:center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 300px; z-index: 100; }
.hidden{ display:none !important; }
#game-area{ width:100vw; height:100vh; position:relative; cursor: crosshair; background: #2c3e50; }
#target{ width:60px; height:60px; background: var(--accent); border-radius:50%; position:absolute; display:flex; justify-content:center; align-items:center; color:white; cursor:pointer; font-weight:bold; box-shadow: 0 0 15px var(--accent); }
.game-ui { position: fixed; top: 15px; background: white; padding: 10px 15px; border-radius: 8px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 50; }
.leaderboard-item{ display:flex; justify-content:space-between; align-items:center; margin:10px 0; border-bottom: 1px solid #eee; padding-bottom: 5px; font-size: 14px; }
.btn-del { background:#ff4757; color:white; border:none; padding:2px 8px; border-radius:4px; cursor:pointer; }
input { padding:10px; width:80%; border:1px solid #ddd; border-radius:5px; margin-bottom:10px; }
button { padding:10px 20px; background:var(--accent); color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold; }
button:hover { opacity: 0.9; }
</style>
</head>

<body>

<div id="screen-login" class="screen">
    <h1 style="color: var(--accent); margin-top:0;">🌋 VolcanoMC</h1>
    <input id="username" type="text" placeholder="Tu nombre o Admin ID">
    <br>
    <button onclick="login()">ENTRAR</button>
</div>

<div id="game-area" class="hidden" onmousedown="gameOver()">
    <div style="left:15px" class="game-ui">Objetivos: <span id="clicks-left">10</span></div>
    <div style="right:15px" class="game-ui">Tiempo: <span id="live-timer">0.00</span>s</div>
    <div id="target" onmousedown="hitTarget(event)">10</div>
</div>

<div id="screen-gameover" class="screen hidden">
    <h1 style="color: #c0392b;">💥 FALLASTE</h1>
    <p>Has tocado fuera del objetivo.</p>
    <p>Tiempo: <span id="fail-time">0.00</span>s</p>
    <button onclick="location.reload()" style="background:#34495e;">REINTENTAR</button>
</div>

<div id="screen-leaderboard" class="screen hidden">
    <h2 style="color: var(--accent);">🏆 TOP 5 GLOBAL</h2>
    <div id="leaderboard-list">Cargando ranking...</div>
    <br>
    <button onclick="location.reload()">VOLVER A JUGAR</button>
</div>

<script>
let currentUser, clicksNeeded, startTime, timerInterval, isAdmin = false, isPlaying = false;

function login(){
    const name = document.getElementById("username").value.trim();
    if(!name) return;
    currentUser = name;
    
    // SISTEMA DE ADMINISTRADOR
    if(name === "VolcanoMC.111"){ 
        isAdmin = true; 
        showLeaderboard(); 
        return; 
    }

    // SI NO ES ADMIN, EMPIEZA EL JUEGO
    document.getElementById("screen-login").classList.add("hidden");
    document.getElementById("game-area").classList.remove("hidden");
    clicksNeeded = 10; 
    isPlaying = true; 
    startTime = Date.now();
    
    timerInterval = setInterval(() => { 
        document.getElementById("live-timer").innerText = ((Date.now()-startTime)/1000).toFixed(2); 
    }, 10);
    
    moveTarget();
}

function moveTarget(){
    const t = document.getElementById("target");
    t.style.left = Math.random() * (window.innerWidth-80) + "px";
    t.style.top = Math.random() * (window.innerHeight-80) + "px";
    t.innerText = clicksNeeded;
    document.getElementById("clicks-left").innerText = clicksNeeded;
}

function hitTarget(event){
    event.stopPropagation();
    clicksNeeded--;
    if(clicksNeeded <= 0){
        const finalTime = ((Date.now()-startTime)/1000).toFixed(2);
        stopGame();
        saveScoreGlobal(currentUser, finalTime);
        showLeaderboard();
    } else { 
        moveTarget(); 
    }
}

function gameOver(){
    if(!isPlaying) return;
    const time = ((Date.now()-startTime)/1000).toFixed(2);
    stopGame();
    document.getElementById("game-area").classList.add("hidden");
    document.getElementById("screen-gameover").classList.remove("hidden");
    document.getElementById("fail-time").innerText = time;
}

function stopGame(){ 
    isPlaying = false; 
    clearInterval(timerInterval); 
}

function showLeaderboard(){
    document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
    document.getElementById("game-area").classList.add("hidden");
    document.getElementById("screen-leaderboard").classList.remove("hidden");
    
    window.loadRankings((scores) => {
        const list = document.getElementById("leaderboard-list");
        if(scores.length === 0) {
            list.innerHTML = "No hay tiempos registrados.";
            return;
        }
        list.innerHTML = scores.map((s, i) => `
            <div class="leaderboard-item">
                <span><b>${i+1}.</b> ${s.user} - ${s.time}s</span>
                ${isAdmin ? `<button class="btn-del" onclick="deleteScoreGlobal('${s.id}')">❌</button>` : ''}
            </div>
        `).join("");
    });
}
</script>
</body>
</html>
