<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/jpg" href="volcanomclogo.png">
<title>VolcanoMC</title>

<style>
  :root { --accent: #e67e22; --bg: #2c3e50; --danger: #e74c3c; }
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; user-select: none; }
  .box { background: white; padding: 25px; border-radius: 15px; width: 320px; text-align: center; color: #333; z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
  .hidden { display: none !important; }
  .input-container { position: relative; width: 100%; margin-bottom: 10px; }
  input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; box-sizing: border-box; }
  .eye-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #777; font-size: 18px; }
  button.main-btn { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 15px; }
  
  .del-btn { background: var(--danger); color: white; border: none; border-radius: 4px; padding: 2px 8px; cursor: pointer; font-weight: bold; margin-left: 10px; }
  
  #admin-panel { width: 400px; color: #333; max-height: 85vh; overflow-y: auto; text-align: left; }
  #admin-panel h2 { text-align: center; color: var(--accent); }
  .admin-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #eee; font-size: 14px; }

  #target { width: 65px; height: 65px; background: var(--accent); border-radius: 50%; position: absolute; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 22px; z-index: 100; }
  .fake-target { width: 55px; height: 55px; background: var(--danger); border-radius: 50%; position: absolute; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 20px; z-index: 90; }
  .ui-box { position: fixed; top: 20px; background: white; padding: 10px 20px; border-radius: 30px; color: #333; font-weight: bold; z-index: 200; }
  .version-tag { position: fixed; bottom: 10px; right: 15px; font-size: 12px; opacity: 0.6; }
</style>

<script>
  function showScreen(id) {
    document.querySelectorAll('.box, #game-area').forEach(s => s.classList.add('hidden'));
    const screen = document.getElementById(id);
    if(screen) screen.classList.remove('hidden');
    if(id === 'main-menu') document.getElementById('user-display').innerText = "Hola, " + window.currentUser;
  }

  function togglePass(id) {
    const input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
  }

  function toggleForms() {
    document.getElementById("login-form").classList.toggle("hidden");
    document.getElementById("register-form").classList.toggle("hidden");
  }
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, set, get, remove, onValue, query, orderByChild, limitToFirst } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDx1e4vz7W2C7SuAhygkmYzJJOKzGdDSuE",
    authDomain: "realtime-database-d61c8.firebaseapp.com",
    databaseURL: "https://realtime-database-d61c8-default-rtdb.firebaseio.com",
    projectId: "realtime-database-d61c8",
    storageBucket: "realtime-database-d61c8.firebasestorage.app",
    messagingSenderId: "42399354921",
    appId: "1:42399354921:web:ad3505f325a98293718438"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  window.accessAccount = async (user, pass, isRegister) => {
    if(!user || !pass) return alert("Rellena los datos");
    const cleanUser = user.replace(/\./g, "_"); 
    
    if ((user.toLowerCase() === "admin" && pass === "admin123") || 
        (user === "VolcanoMC111" && pass === "admin123")) {
        window.currentUser = user;
        showScreen("admin-panel");
        loadAdminData();
        return;
    }

    const userRef = ref(db, 'usuarios/' + cleanUser);
    const snapshot = await get(userRef);

    if (isRegister) {
      if (snapshot.exists()) alert("Ese nombre ya existe");
      else {
        await set(userRef, { password: pass, fecha_registro: new Date().toLocaleString() });
        alert("¡Cuenta creada!");
        toggleForms();
      }
    } else {
      if (snapshot.exists() && snapshot.val().password === pass) {
        window.currentUser = user;
        showScreen("main-menu");
      } else alert("Datos incorrectos");
    }
  };

  window.deleteUser = async (u) => { 
    if(confirm("¿Seguro que quieres eliminar al usuario " + u + "?")) { 
      await remove(ref(db, 'usuarios/' + u)); 
      await remove(ref(db, 'rankings/' + u)); 
      alert("Usuario eliminado.");
    }
  };

  window.deleteRank = async (u) => { 
    if(confirm("¿Borrar record de " + u + "?")) { 
      await remove(ref(db, 'rankings/' + u)); 
      alert("Record borrado.");
    }
  };

  function loadAdminData() {
    onValue(ref(db, 'usuarios'), (s) => {
        let h = "<h3>Gestionar Usuarios</h3>";
        s.forEach(c => { 
          if(c.key !== "admin" && c.key !== "VolcanoMC111") {
            h += `<div class="admin-item"><span>${c.key}</span> <button class="del-btn" onclick="deleteUser('${c.key}')">EXPULSAR</button></div>`; 
          }
        });
        document.getElementById("admin-users").innerHTML = h;
    });
    onValue(ref(db, 'rankings'), (s) => {
        let h = "<h3>Gestionar Ranking</h3>";
        s.forEach(c => { 
            h += `<div class="admin-item"><span>${c.val().user}: ${c.val().time}s</span> <button class="del-btn" onclick="deleteRank('${c.key}')">QUITAR</button></div>`; 
        });
        document.getElementById("admin-ranks").innerHTML = h;
    });
  }

  window.saveScore = async (newTime) => {
    const cleanUser = window.currentUser.replace(/\./g, "_");
    const scoreRef = ref(db, 'rankings/' + cleanUser);
    const newTimeNum = parseFloat(newTime);
    const snapshot = await get(scoreRef);
    if (!snapshot.exists() || newTimeNum < snapshot.val().time) {
      await set(scoreRef, { user: window.currentUser, time: newTimeNum });
    }
  };

  window.loadRankings = (callback) => {
    const q = query(ref(db, 'rankings'), orderByChild('time'), limitToFirst(5));
    onValue(q, (snap) => {
      const data = [];
      snap.forEach(c => { data.push(c.val()); });
      callback(data);
    });
  };

  window.showScreen = showScreen;
</script>
</head>

<body>
<audio id="bg-music" loop><source src="musica.mp3" type="audio/mpeg"></audio>
<div class="version-tag">Version 1.3.1</div>

<div id="auth-screen" class="box">
    <div style="margin-bottom: 15px;">
        <h1 style="color:var(--accent); margin:0;">VolcanoMC</h1>
    </div>
    <div id="login-form">
        <div class="input-container"><input id="u-name" type="text" placeholder="Usuario"></div>
        <div class="input-container">
            <input id="u-pass" type="password" placeholder="Contraseña">
            <button class="eye-btn" onclick="togglePass('u-pass')">👁️</button>
        </div>
        <button class="main-btn" onclick="accessAccount(document.getElementById('u-name').value, document.getElementById('u-pass').value, false)">ENTRAR</button>
        <p onclick="toggleForms()" style="cursor:pointer; font-size:12px; margin-top:10px;">¿No tienes cuenta? Regístrate</p>
    </div>
    <div id="register-form" class="hidden">
        <div class="input-container"><input id="reg-name" type="text" placeholder="Nuevo Usuario"></div>
        <div class="input-container">
            <input id="reg-pass" type="password" placeholder="Contraseña">
            <button class="eye-btn" onclick="togglePass('reg-pass')">👁️</button>
        </div>
        <button class="main-btn" style="background:#27ae60" onclick="accessAccount(document.getElementById('reg-name').value, document.getElementById('reg-pass').value, true)">CREAR CUENTA</button>
        <p onclick="toggleForms()" style="cursor:pointer; font-size:12px; margin-top:10px;">Ya tengo cuenta</p>
    </div>
</div>

<div id="main-menu" class="box hidden">
    <h2 id="user-display" style="color:var(--accent); margin-top:0;"></h2>
    <button class="main-btn" onclick="startGame()">JUGAR</button>
    <button class="main-btn" style="background:#34495e" onclick="showRank()">RANKING</button>
    <button class="main-btn" style="background:#c0392b" onclick="location.reload()">SALIR</button>
</div>

<div id="admin-panel" class="box hidden">
    <h2>PANEL CONTROL</h2>
    <div id="admin-users"></div>
    <div id="admin-ranks" style="margin-top:20px;"></div>
    <button class="main-btn" style="background:#333; margin-top:20px;" onclick="showScreen('auth-screen')">CERRAR SESIÓN</button>
</div>

<div id="game-area" class="hidden" style="width:100vw; height:100vh; position:relative;" onmousedown="failGame()">
    <div class="ui-box" style="left:20px;">Dianas: <span id="c-count">10</span></div>
    <div class="ui-box" style="right:20px;">Tiempo: <span id="t-val">0.00</span>s</div>
    <div id="target" onmousedown="hit(event)">10</div>
    <div id="bombs-container"></div> 
</div>

<div id="rank-screen" class="box hidden">
    <h2>TOP 5</h2>
    <div id="list" style="text-align:left;"></div>
    <button class="main-btn" onclick="showScreen('main-menu')">VOLVER</button>
</div>

<script>
let clicks = 10, startTime, timerInt, playing = false, bombInt;
const music = document.getElementById("bg-music");

function startGame() {
    music.play().catch(e => {});
    showScreen('game-area');
    clicks = 10; playing = true; startTime = Date.now();
    document.getElementById("c-count").innerText = clicks;
    timerInt = setInterval(() => { document.getElementById("t-val").innerText = ((Date.now() - startTime)/1000).toFixed(2); }, 10);
    bombInt = setInterval(spawnBomb, 600);
    move();
}

function move() {
    const t = document.getElementById("target");
    t.style.left = Math.random() * (window.innerWidth - 85) + "px";
    t.style.top = Math.random() * (window.innerHeight - 85) + "px";
    t.innerText = clicks;
}

function hit(e) {
    e.stopPropagation(); clicks--;
    document.getElementById("c-count").innerText = clicks;
    if (clicks <= 0) endGame(true); else { move(); document.getElementById("bombs-container").innerHTML = ""; }
}

function spawnBomb() {
    if(!playing) return;
    const bomb = document.createElement('div');
    bomb.className = 'fake-target'; bomb.innerText = "X";
    bomb.style.left = Math.random() * (window.innerWidth - 70) + "px";
    bomb.style.top = Math.random() * (window.innerHeight - 70) + "px";
    bomb.onmousedown = (e) => { 
        e.stopPropagation(); 
        clicks = Math.min(10, clicks + 1); 
        document.getElementById("c-count").innerText = clicks; 
        bomb.remove(); 
    };
    document.getElementById("bombs-container").appendChild(bomb);
    setTimeout(() => { if(bomb.parentNode) bomb.remove(); }, 1200);
}

function failGame() { 
    if(playing) { 
        alert("¡FALLASTE!"); 
        music.pause(); music.currentTime = 0; 
        endGame(false); 
    } 
}

function endGame(win) {
    playing = false; clearInterval(timerInt); clearInterval(bombInt);
    music.pause(); music.currentTime = 0;
    if(win) { window.saveScore(document.getElementById("t-val").innerText); showRank(); } 
    document.getElementById("bombs-container").innerHTML = "";
    if(!win) showScreen('main-menu');
}

function showRank() {
    showScreen('rank-screen');
    window.loadRankings(scores => {
        document.getElementById("list").innerHTML = scores.map((s, i) => `
            <div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #eee">
                <span><b>${i+1}.</b> ${s.user}</span><span>${s.time}s</span>
            </div>`).join("");
    });
}
</script>
</body>
</html>
