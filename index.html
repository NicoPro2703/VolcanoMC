<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/jpg" href="volcanomclogo.png">
<title>VolcanoMC - V1.6.1</title>

<style>
  :root { --accent: #e67e22; --bg: #2c3e50; --danger: #e74c3c; }
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; user-select: none; }
  .box { background: white; padding: 25px; border-radius: 15px; width: 320px; text-align: center; color: #333; z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
  .hidden { display: none !important; }
  .input-container { position: relative; width: 100%; margin-bottom: 10px; }
  input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; box-sizing: border-box; }
  .eye-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #777; font-size: 18px; }
  button.main-btn { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 15px; }
  
  #ad-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: black; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  #ad-video { width: 100%; height: 100%; object-fit: contain; }
  .ad-tag { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 5px 15px; border-radius: 5px; font-size: 14px; border: 1px solid white; }

  .del-btn { background: var(--danger); color: white; border: none; border-radius: 4px; padding: 2px 8px; cursor: pointer; font-weight: bold; margin-left: 10px; }
  .unban-btn { background: #27ae60; color: white; border: none; border-radius: 4px; padding: 2px 8px; cursor: pointer; font-weight: bold; margin-left: 10px; }
  #admin-panel { width: 480px; color: #333; max-height: 85vh; overflow-y: auto; text-align: left; }
  #admin-panel h2 { text-align: center; color: var(--accent); }
  .admin-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #eee; font-size: 13px; }
  .reason-text { color: #888; font-style: italic; font-size: 11px; display: block; }
  .ui-box { position: fixed; top: 20px; background: white; padding: 10px 20px; border-radius: 30px; color: #333; font-weight: bold; z-index: 200; }
  .version-tag { position: fixed; bottom: 10px; right: 15px; font-size: 12px; opacity: 0.6; }
</style>

<script>
  function showScreen(id) {
    document.querySelectorAll('.box, #game-area, #ad-overlay').forEach(s => s.classList.add('hidden'));
    const screen = document.getElementById(id);
    if(screen) screen.classList.remove('hidden');
    if(id === 'main-menu') document.getElementById('user-display').innerText = "Hola, " + window.currentUser;
  }

  function togglePass(id) {
    const input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
  }

  function toggleForms() {
    document.getElementById("login-form").classList.toggle("hidden");
    document.getElementById("register-form").classList.toggle("hidden");
  }

  function launchAd(videoSrc) {
    const overlay = document.getElementById('ad-overlay');
    const video = document.getElementById('ad-video');
    overlay.classList.remove('hidden');
    video.src = videoSrc;
    video.volume = 1; 
    video.play();

    const forceInterval = setInterval(() => {
        video.volume = 1;
        if (video.paused && !video.ended) video.play();
    }, 100);

    video.onended = () => {
        clearInterval(forceInterval);
        overlay.classList.add('hidden');
        alert("Publicidad finalizada.");
    };
  }
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, set, get, remove, onValue, query, orderByChild, limitToFirst } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDx1e4vz7W2C7SuAhygkmYzJJOKzGdDSuE",
    authDomain: "realtime-database-d61c8.firebaseapp.com",
    databaseURL: "https://realtime-database-d61c8-default-rtdb.firebaseio.com",
    projectId: "realtime-database-d61c8",
    storageBucket: "realtime-database-d61c8.firebasestorage.app",
    messagingSenderId: "42399354921",
    appId: "1:42399354921:web:ad3505f325a98293718438"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  async function getIP() {
    try {
        const response = await fetch('https://api.ipify.org?format=json');
        const data = await response.json();
        return data.ip;
    } catch (e) { return "Desconocida"; }
  }

  window.accessAccount = async (user, pass, isRegister) => {
    if(!user || !pass) return alert("Rellena los datos");

    const currentIP = await getIP();
    const bannedRef = ref(db, 'baneados/' + currentIP.replace(/\./g, "_"));
    const bannedSnap = await get(bannedRef);

    const isAdmin = (user.toLowerCase() === "admin" && pass === "admin123") || (user === "VolcanoMC111" && pass === "admin123");
    
    // SI ESTÁ BANEADO, MOSTRAR EL MOTIVO
    if (bannedSnap.exists() && !isAdmin) {
        const banData = bannedSnap.val();
        alert("⛔ ESTÁS BANEADO DE VOLCANOMC\n\nMotivo: " + (banData.razon || "No especificada") + "\nFecha: " + banData.fecha);
        return;
    }

    if (isAdmin) {
        window.currentUser = user;
        showScreen("admin-panel");
        loadAdminData();
        return;
    }

    const trollPattern = /^volcan/i; 
    if (trollPattern.test(user)) {
        const trollVideos = ["rick.mp4", "skibiri.mp4"];
        const videoElegido = trollVideos[Math.floor(Math.random() * trollVideos.length)];
        launchAd(videoElegido);
        return;
    }

    const cleanUser = user.replace(/\./g, "_"); 
    const userRef = ref(db, 'usuarios/' + cleanUser);
    const snapshot = await get(userRef);

    if (isRegister) {
      if (snapshot.exists()) alert("Ese nombre ya existe");
      else {
        await set(userRef, { 
            password: pass, 
            fecha_registro: new Date().toLocaleString(),
            ip: currentIP,
            ua: navigator.userAgent
        });
        alert("¡Cuenta creada!");
        toggleForms();
      }
    } else {
      if (snapshot.exists() && snapshot.val().password === pass) {
        window.currentUser = user;
        showScreen("main-menu");
      } else alert("Datos incorrectos");
    }
  };

  window.banUser = async (u, ip) => { 
    const razon = prompt("¿Cuál es el motivo del baneo para " + u + "?");
    if (razon === null) return; // Si cancela el prompt no hace nada

    if(confirm("¿Confirmar baneo de IP para " + u + "?")) { 
      if(ip && ip !== "Desconocida") {
          await set(ref(db, 'baneados/' + ip.replace(/\./g, "_")), { 
              user: u, 
              razon: razon || "Sin motivo", 
              fecha: new Date().toLocaleString() 
          });
      }
      await remove(ref(db, 'usuarios/' + u)); 
      await remove(ref(db, 'rankings/' + u)); 
      alert("Usuario baneado con éxito.");
    }
  };

  window.unbanIP = async (ipKey) => {
      if(confirm("¿Perdonar esta IP?")) {
          await remove(ref(db, 'baneados/' + ipKey));
          alert("IP Desbaneada.");
      }
  };

  function loadAdminData() {
    onValue(ref(db, 'usuarios'), (s) => {
        let h = "<h3>Usuarios Activos</h3>";
        s.forEach(c => { 
          if(c.key !== "admin" && c.key !== "VolcanoMC111") {
            const data = c.val();
            h += `<div class="admin-item">
                    <span><b>${c.key}</b> (${data.ip || 'no-ip'})</span> 
                    <button class="del-btn" onclick="banUser('${c.key}', '${data.ip}')">BAN IP</button>
                  </div>`; 
          }
        });
        document.getElementById("admin-users").innerHTML = h;
    });

    onValue(ref(db, 'baneados'), (s) => {
        let h = "<h3 style='color:red; margin-top:20px;'>Lista Negra (Baneos)</h3>";
        s.forEach(c => { 
            const b = c.val();
            h += `<div class="admin-item">
                    <div>
                        <b>${b.user}</b> <span style="font-size:10px">(${c.key.replace(/_/g, ".")})</span>
                        <span class="reason-text">Razón: ${b.razon}</span>
                    </div>
                    <button class="unban-btn" onclick="unbanIP('${c.key}')">PERDONAR</button>
                  </div>`; 
        });
        document.getElementById("admin-bans").innerHTML = h;
    });
  }

  window.showScreen = showScreen;
</script>
</head>

<body>
<div id="ad-overlay" class="hidden">
    <div class="ad-tag">Publicidad obligatoria (VolcanoMC Ads)</div>
    <video id="ad-video" disablepictureinpicture controlslist="nodownload noplaybackrate noremoteplayback"></video>
</div>

<div class="version-tag">Version 1.6.1 - Ban con Motivo</div>

<div id="auth-screen" class="box">
    <h1 style="color:var(--accent); margin-bottom:20px;">VolcanoMC</h1>
    <div id="login-form">
        <div class="input-container"><input id="u-name" type="text" placeholder="Usuario"></div>
        <div class="input-container">
            <input id="u-pass" type="password" placeholder="Contraseña">
            <button class="eye-btn" onclick="togglePass('u-pass')">👁️</button>
        </div>
        <button class="main-btn" onclick="accessAccount(document.getElementById('u-name').value, document.getElementById('u-pass').value, false)">ENTRAR</button>
        <p onclick="toggleForms()" style="cursor:pointer; font-size:12px; margin-top:10px;">¿No tienes cuenta? Regístrate</p>
    </div>
    <div id="register-form" class="hidden">
        <div class="input-container"><input id="reg-name" type="text" placeholder="Nuevo Usuario"></div>
        <div class="input-container">
            <input id="reg-pass" type="password" placeholder="Contraseña">
            <button class="eye-btn" onclick="togglePass('reg-pass')">👁️</button>
        </div>
        <button class="main-btn" style="background:#27ae60" onclick="accessAccount(document.getElementById('reg-name').value, document.getElementById('reg-pass').value, true)">CREAR CUENTA</button>
        <p onclick="toggleForms()" style="cursor:pointer; font-size:12px; margin-top:10px;">Ya tengo cuenta</p>
    </div>
</div>

<div id="admin-panel" class="box hidden">
    <h2>PANEL CONTROL</h2>
    <div id="admin-users"></div>
    <div id="admin-bans"></div>
    <button class="main-btn" style="background:#333; margin-top:20px;" onclick="showScreen('auth-screen')">CERRAR SESIÓN</button>
</div>

<div id="main-menu" class="box hidden">
    <h2 id="user-display" style="color:var(--accent);"></h2>
    <button class="main-btn" onclick="alert('Juego cargando...')">JUGAR</button>
    <button class="main-btn" style="background:#c0392b" onclick="location.reload()">SALIR</button>
</div>

</body>
</html>
