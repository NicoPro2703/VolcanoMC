<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VolcanoMC - Beta 11 Final Pro</title>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, set, get, push, onValue, query, orderByChild, limitToFirst } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDx1e4vz7W2C7SuAhygkmYzJJOKzGdDSuE",
    authDomain: "realtime-database-d61c8.firebaseapp.com",
    databaseURL: "https://realtime-database-d61c8-default-rtdb.firebaseio.com",
    projectId: "realtime-database-d61c8",
    storageBucket: "realtime-database-d61c8.firebasestorage.app",
    messagingSenderId: "42399354921",
    appId: "1:42399354921:web:ad3505f325a98293718438"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  window.accessAccount = async (user, pass, isRegister) => {
    if(!user || !pass) return alert("Rellena los datos");
    const cleanUser = user.replace(/\./g, "_"); 
    const lowerUser = user.toLowerCase();
    
    if (isRegister && (lowerUser === "volcano" || lowerUser === "volcanomc")) {
        window.stopMusic(); 
        showMemeVideo(Math.random() > 0.5 ? "rick.mp4" : "skibiri.mp4");
        return; 
    }

    const userRef = ref(db, 'usuarios/' + cleanUser);
    const snapshot = await get(userRef);
    if (isRegister) {
      if (snapshot.exists()) alert("Ese nombre ya existe");
      else {
        await set(userRef, { password: pass });
        alert("¡Cuenta creada!");
        toggleForms();
      }
    } else {
      if (snapshot.exists() && snapshot.val().password === pass) {
        window.currentUser = user;
        showScreen("main-menu");
      } else alert("Datos incorrectos");
    }
  };

  window.saveScore = (time) => { push(ref(db, 'rankings'), { user: window.currentUser, time: parseFloat(time) }); };
  window.loadRankings = (callback) => {
    const q = query(ref(db, 'rankings'), orderByChild('time'), limitToFirst(5));
    onValue(q, (snap) => {
      const data = [];
      snap.forEach(c => { data.push({ id: c.key, ...c.val() }); });
      data.sort((a,b) => a.time - b.time);
      callback(data);
    });
  };
</script>

<style>
  :root { --accent: #e67e22; --accent-dark: #d35400; --bg: #1a252f; }
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; }
  
  .box { background: white; padding: 35px 30px; border-radius: 24px; width: 320px; text-align: center; color: #333; z-index: 10; box-shadow: 0 20px 50px rgba(0,0,0,0.4); position: relative; }
  .hidden { display: none !important; }
  
  .settings-btn { position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 20px; cursor: pointer; color: #ccc; transition: 0.3s; }
  .settings-btn:hover { color: var(--accent); transform: rotate(90deg); }

  .logo-title { color: var(--accent); font-size: 28px; font-weight: 800; margin-bottom: 20px; text-transform: uppercase; }

  .input-group { position: relative; width: 100%; margin-bottom: 12px; }
  input { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px; font-size: 15px; outline: none; transition: 0.3s; background: #f9f9f9; }
  input:focus { border-color: var(--accent); background: #fff; }
  
  .eye-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 20px; cursor: pointer; color: #bbb; }

  button.main-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; box-shadow: 0 4px 15px rgba(230, 126, 34, 0.3); transition: 0.2s; }
  button.main-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(230, 126, 34, 0.4); }

  /* JUEGO */
  #target { width: 70px; height: 70px; background: var(--accent); border-radius: 50%; position: absolute; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 24px; box-shadow: 0 0 20px var(--accent); z-index: 100; }
  .ui-box { position: fixed; top: 20px; background: white; padding: 10px 25px; border-radius: 30px; color: #333; font-weight: bold; font-size: 18px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
  .version-tag { position: fixed; bottom: 10px; right: 15px; font-size: 12px; opacity: 0.5; color: white; }

  #meme-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: black; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
</style>
</head>
<body onclick="iniciarAudio()">

<audio id="bg-music" loop preload="auto">
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<div class="version-tag">Beta 11 Final Fix</div>

<div id="meme-container" class="hidden">
    <video id="meme-video" controls style="width:80%; max-width:500px; border:4px solid var(--accent);"></video>
    <button class="main-btn" onclick="location.reload()" style="width:200px; margin-top:20px;">CERRAR</button>
</div>

<div id="auth-screen" class="box">
    <button class="settings-btn" onclick="showScreen('config-screen')">⚙️</button>
    <h1 class="logo-title">VolcanoMC</h1>
    <div id="login-form">
        <input id="u-name" type="text" placeholder="Usuario">
        <div class="input-group">
            <input id="u-pass" type="password" placeholder="Contraseña">
            <button id="eye-login" class="eye-btn" onclick="togglePass('u-pass', 'eye-login')">👁️</button>
        </div>
        <button class="main-btn" onclick="accessAccount(document.getElementById('u-name').value, document.getElementById('u-pass').value, false)">ENTRAR</button>
        <p onclick="toggleForms()" style="cursor:pointer; font-size:12px; margin-top:15px; color:#666">¿No tienes cuenta? <span style="color:var(--accent); font-weight:bold;">Regístrate</span></p>
    </div>
    <div id="register-form" class="hidden">
        <input id="reg-name" type="text" placeholder="Nuevo Usuario">
        <div class="input-group">
            <input id="reg-pass" type="password" placeholder="Contraseña">
            <button id="eye-reg" class="eye-btn" onclick="togglePass('reg-pass', 'eye-reg')">👁️</button>
        </div>
        <button class="main-btn" style="background: linear-gradient(135deg, #27ae60, #2ecc71);" onclick="accessAccount(document.getElementById('reg-name').value, document.getElementById('reg-pass').value, true)">REGISTRARME</button>
        <p onclick="toggleForms()" style="cursor:pointer; font-size:12px; margin-top:15px; color:#666">Ya tengo cuenta</p>
    </div>
</div>

<div id="config-screen" class="box hidden">
    <h2 style="color:var(--accent); margin-top:0;">AJUSTES</h2>
    <div style="display:flex; justify-content:space-between; align-items:center; margin:25px 0;">
        <span>Volumen</span>
        <input type="range" id="vol-slider" min="0" max="1" step="0.1" value="0.5" oninput="updateVol()" style="width:60%; accent-color:var(--accent)">
    </div>
    <button class="main-btn" onclick="showScreen('auth-screen')">GUARDAR</button>
</div>

<div id="main-menu" class="box hidden">
    <h2 id="user-display" style="color:var(--accent); margin-top:0;"></h2>
    <button class="main-btn" onclick="startGame()">JUGAR</button>
    <button class="main-btn" style="background: #34495e" onclick="showRank()">RANKING</button>
    <button class="main-btn" style="background: #c0392b" onclick="location.reload()">SALIR</button>
</div>

<div id="game-area" class="hidden" style="width:100vw; height:100vh; position:relative;" onmousedown="failGame()">
    <div class="ui-box" style="left:20px;">Dianas: <span id="c-count">10</span></div>
    <div class="ui-box" style="right:20px;">Tiempo: <span id="t-val">0.00</span>s</div>
    <div id="target" onmousedown="hit(event)">10</div>
</div>

<div id="rank-screen" class="box hidden">
    <h2 style="color:var(--accent); margin-top:0;">TOP 5</h2>
    <div id="list" style="margin-bottom:15px; text-align:left;"></div>
    <button class="main-btn" onclick="showScreen('main-menu')">VOLVER</button>
</div>

<script>
let clicks = 10, startTime, timerInt, playing = false;
const music = document.getElementById("bg-music");

function iniciarAudio() {
    if(music.paused) {
        music.volume = 0;
        music.play().then(() => {
            let targetVol = document.getElementById("vol-slider").value;
            let fade = setInterval(() => {
                if (music.volume < targetVol) music.volume = Math.min(targetVol, music.volume + 0.05);
                else clearInterval(fade);
            }, 100);
        }).catch(e => console.log("Clic detectado, esperando..."));
    }
}

window.stopMusic = () => { music.pause(); music.currentTime = 0; };
function updateVol() { music.volume = document.getElementById("vol-slider").value; }

window.togglePass = (inputId, btnId) => {
    const input = document.getElementById(inputId);
    const btn = document.getElementById(btnId);
    if (input.type === "password") { input.type = "text"; btn.innerText = "🙈"; } 
    else { input.type = "password"; btn.innerText = "👁️"; }
};

function showMemeVideo(src) { 
    const v = document.getElementById("meme-video"); v.src = src; 
    document.getElementById("meme-container").classList.remove("hidden"); v.play(); 
}

function showScreen(id) {
    document.querySelectorAll('.box, #game-area').forEach(s => s.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    if(id === 'main-menu') document.getElementById('user-display').innerText = "Hola, " + window.currentUser;
    iniciarAudio(); // Asegurar audio al cambiar de pantalla
}

function toggleForms() { 
    document.getElementById("login-form").classList.toggle("hidden"); 
    document.getElementById("register-form").classList.toggle("hidden"); 
}

function startGame() {
    iniciarAudio(); 
    showScreen('game-area');
    clicks = 10; playing = true; startTime = Date.now();
    document.getElementById("c-count").innerText = clicks;
    timerInt = setInterval(() => { document.getElementById("t-val").innerText = ((Date.now() - startTime)/1000).toFixed(2); }, 10);
    move();
}

function move() {
    const t = document.getElementById("target");
    t.style.left = Math.random() * (window.innerWidth - 85) + "px";
    t.style.top = Math.random() * (window.innerHeight - 85) + "px";
    t.innerText = clicks;
}

function hit(e) {
    e.stopPropagation(); clicks--;
    document.getElementById("c-count").innerText = clicks;
    if (clicks <= 0) {
        playing = false; clearInterval(timerInt);
        window.saveScore(document.getElementById("t-val").innerText);
        showRank();
    } else move();
}

function failGame() {
    if(!playing) return;
    playing = false; clearInterval(timerInt);
    alert("¡HAS FALLADO EL DISPARO!");
    showScreen('main-menu');
}

function showRank() {
    showScreen('rank-screen');
    window.loadRankings(scores => {
        document.getElementById("list").innerHTML = scores.map((s, i) => `
            <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #eee">
                <span><b>${i+1}.</b> ${s.user}</span><span>${s.time}s</span>
            </div>`).join("");
    });
}
</script>
</body>
</html>
